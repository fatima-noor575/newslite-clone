version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agropilot
      POSTGRES_PASSWORD: agropilot
      POSTGRES_DB: agropilot
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ../backend
    env_file: ../backend/.env
    depends_on: [db, redis]
    ports: ["8000:8000"]
    command: bash -c "alembic upgrade head && uvicorn main.app:app --host 0.0.0.0 --port 8000"

  worker:
    build: ../backend
    env_file: ../backend/.env
    depends_on: [db, redis]
    command: celery -A services.tasks.celery_app worker -l info

  frontend:
    build: ../frontend
    env_file: ../frontend/.env.local
    depends_on: [backend]
    ports: ["3000:3000"]

  nginx:
    image: nginx:alpine
    depends_on: [frontend, backend]
    ports: ["80:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
